name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # WPF requires a Windows runner.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SessionLimit/SessionLimit.csproj

      - name: Build
        run: dotnet build SessionLimit/SessionLimit.csproj -c Release --no-restore

      - name: Publish single-file
        run: >
          dotnet publish SessionLimit/SessionLimit.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true -o publish

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: SessionLimit-win-x64
          path: publish/SessionLimit.exe
          if-no-files-found: error
