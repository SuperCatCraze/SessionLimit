name: release

# Tag a commit v0.3.0 and push it; this publishes the release the in-app updater reads.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file
        run: >
          dotnet publish SessionLimit/SessionLimit.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true -o publish

      # A release the app installs on itself must at minimum survive being started.
      # v0.3.0 shipped a bundle that ran for seven seconds and died with
      # DllNotFoundException, which nothing else in this pipeline would have caught.
      - name: Smoke test
        shell: pwsh
        run: |
          $err = Join-Path $env:RUNNER_TEMP 'smoke-stderr.txt'
          $p = Start-Process publish/SessionLimit.exe -PassThru `
                 -RedirectStandardError $err -RedirectStandardOutput (Join-Path $env:RUNNER_TEMP 'smoke-stdout.txt')
          $waited = 0
          while (-not $p.HasExited -and $waited -lt 25) { Start-Sleep -Seconds 1; $waited++ }
          if ($p.HasExited) {
            Write-Host "::error::Exited after ${waited}s with code $($p.ExitCode)"
            Get-Content $err -ErrorAction SilentlyContinue | Write-Host
            throw "The published build does not stay running."
          }
          $p | Stop-Process -Force
          Write-Host "Still running after ${waited}s."

      # The updater refuses a download whose stamped version doesn't match the tag, so a
      # mismatch here would ship an update nobody can install. Fail now instead.
      - name: Check the binary matches the tag
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.tag }}' } else { '${{ github.ref_name }}' }
          $expected = [version]$tag.TrimStart('v')
          $actual = [version](Get-Item publish/SessionLimit.exe).VersionInfo.FileVersion
          Write-Host "tag $tag -> expected $expected, binary reports $actual"
          # Compare major.minor.build only. FileVersion always carries a fourth field, so
          # [version]'0.3.0.0' -ne [version]'0.3.0' (revision 0 vs -1) even though they match.
          if ($actual.Major -ne $expected.Major -or
              $actual.Minor -ne $expected.Minor -or
              [Math]::Max($actual.Build, 0) -ne [Math]::Max($expected.Build, 0)) {
            throw "Version mismatch: bump <Version> in SessionLimit.csproj to $($expected.ToString(3))"
          }

      - name: Checksum
        shell: pwsh
        run: |
          (Get-FileHash publish/SessionLimit.exe -Algorithm SHA256).Hash.ToLower() |
            Out-File publish/SessionLimit.exe.sha256 -Encoding ascii -NoNewline

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.tag }}' } else { '${{ github.ref_name }}' }
          $sha = (Get-Content publish/SessionLimit.exe.sha256 -Raw).Trim()
          $size = [math]::Round((Get-Item publish/SessionLimit.exe).Length / 1MB, 0)

          # Commit list since the previous tag, so the page says what actually changed
          # instead of only linking to a diff.
          $changes = gh api "repos/${{ github.repository }}/releases/generate-notes" -f tag_name=$tag --jq '.body'

          # The body lives in a template file rather than a here-string: a PowerShell
          # here-string has to close at column 0, which is exactly where a YAML block
          # scalar ends, and the two rules cannot both be satisfied here.
          $body = Get-Content .github/release-notes-template.md -Raw
          $body = $body.Replace('{{SIZE}}', $size).Replace('{{SHA}}', $sha).Replace('{{CHANGES}}', $changes)
          $body | Out-File release-notes.md -Encoding utf8

          gh release create $tag publish/SessionLimit.exe publish/SessionLimit.exe.sha256 --repo ${{ github.repository }} --title "Session Limit $tag" --notes-file release-notes.md
